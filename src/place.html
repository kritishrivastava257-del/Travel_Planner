<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Places - Smart Travel Planner</title>

    <link rel="stylesheet" href="./output.css" />

    <link
      rel="icon"
      href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS0ku_JAxG2yYPtQ1m3e0XNY3vaw5bL8IhHBg&s"
    />
  </head>

  <body class="bg-gradient-to-br from-green-100 to-green-400 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-white shadow-md">
      <div class="max-w-6xl mx-auto px-4">

        <div class="flex justify-between items-center h-16">

          <div class="text-2xl font-bold text-blue-600">
            SmartTravel
          </div>

          <div class="hidden md:flex space-x-6">

            <a href="home.html" class="text-gray-700 hover:text-blue-600">
              Home
            </a>

            <a href="destination.html" class="text-gray-700 hover:text-blue-600">
              Destination
            </a>

            <a href="weather.html" class="text-gray-700 hover:text-blue-600">
              Weather
            </a>

            <a href="places.html" class="text-gray-700 hover:text-blue-600">
              Places
            </a>

            <a href="budget.html" class="text-gray-700 hover:text-blue-600">
              Budget
            </a>

          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-6xl mx-auto mt-16 px-4">

      <h1 class="text-4xl font-bold text-center text-green-700 mb-2">
        Tourist Places
      </h1>

      <h2
        id="cityName"
        class="text-center text-gray-700 text-lg mb-10"
      ></h2>

      <!-- Loading -->
      <p
        id="loading"
        class="text-center text-xl text-gray-600 animate-pulse"
      >
        Loading Places...
      </p>

      <!-- Places Grid -->
      <div
        id="placesBox"
        class="hidden mt-10"
        style="
          display:grid;
          grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
          gap:24px;
        "
      ></div>

      <!-- Error -->
      <p
        id="error"
        class="hidden text-center text-red-700 font-semibold text-lg mt-6"
      >
        ❌ Places Not Found
      </p>

    </div>

    <script src="./JS/places.js"></script>

  </body>
</html>
